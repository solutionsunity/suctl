[Definition]
# Merged 403 + 404. The referer-guard ("-") only counts errors with no Referer
# header — i.e. direct probing, not a real visitor following a stale internal
# link — so legitimate users are never banned by a broken link on the site.
failregex = ^<HOST> .*"(GET|POST|HEAD|PUT|PATCH|DELETE|OPTIONS) [^"]+" (403|404) \d+ "-" "

ignoreregex =
