[Definition]
# Probes for sensitive paths and for script extensions that have no place on an
# Odoo/nginx site. Any single hit is hostile, so the jail bans on a low maxretry.
failregex = ^<HOST> .*"(GET|POST|HEAD|PUT|PATCH|DELETE|OPTIONS) /(\.env|\.git|\.aws|\.ssh|\.svn|\.hg|wp-login|wp-admin|wp-config|xmlrpc\.php|phpinfo|phpmyadmin|pma|adminer|actuator|telescope|horizon|graphql|console|debug|healthz|config|vendor|backup)[^"]*"
            ^<HOST> .*"(GET|POST|HEAD) /[^"]*\.(php|asp|aspx|jsp|cgi|pl|py|sh|bak|old|sql|swp|env)([?\s][^"]*)?"

ignoreregex =
